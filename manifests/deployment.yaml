apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-lab20-wf
  labels:
    app.kubernetes.io/name: aks-lab20-wf
    kubernetes.azure.com/generator: devhub
  namespace: sample-app-namespace-1776656613927
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: aks-lab20-wf
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aks-lab20-wf
    spec:
      containers:
        - name: aks-lab20-wf
          image: akslabacr1211.azurecr.io/image-workflow-1776656613917:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "500"
              memory: "1000"
            limits:
              cpu: "1000"
              memory: "2000"
          envFrom:
            - configMapRef:
                name: aks-lab20-wf-config
            - secretRef:
                name: secret-ref
                optional: true
          livenessProbe:
            tcpSocket:
              port: 5000
          readinessProbe:
            tcpSocket:
              port: 5000
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
            initialDelaySeconds: 0
          startupProbe:
            tcpSocket:
              port: 5000
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
            initialDelaySeconds: 0
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
              add:
                - SETPCAP
                - MKNOD
                - AUDIT_WRITE
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - FSETID
                - KILL
                - SETGID
                - SETUID
                - NET_BIND_SERVICE
                - SYS_CHROOT
                - SETFCAP
                - SYS_PTRACE
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: aks-lab20-wf
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: aks-lab20-wf