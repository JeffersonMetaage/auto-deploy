apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aks-lab03-wf
  labels:
    app.kubernetes.io/name: aks-lab03-wf
    app.kubernetes.io/part-of: aks-lab03-wf-project
    kubernetes.azure.com/generator: devhub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aks-lab03-wf
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80